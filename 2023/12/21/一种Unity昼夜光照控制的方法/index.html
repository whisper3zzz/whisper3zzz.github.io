an><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">using</span> UnityEngine;</span><br><span class="line"><span class="keyword">public</span> <span class="keyword">class</span> <span class="title">DayNightCycle</span> : <span class="title">MonoBehaviour</span></span><br><span class="line">&#123;</span><br><span class="line">	<span class="keyword">public</span> Light sun;</span><br><span class="line">	<span class="keyword">public</span> Light lightEmit;</span><br><span class="line">	<span class="keyword">public</span> Light[] indoorLights;</span><br><span class="line"></span><br><span class="line">	<span class="keyword">public</span> <span class="built_in">float</span> dayDuration = <span class="number">60f</span>; <span class="comment">// 一天的持续时间（秒）</span></span><br><span class="line"></span><br><span class="line">	 <span class="function"><span class="keyword">void</span> <span class="title">Update</span>()</span></span><br><span class="line">	&#123;</span><br><span class="line">		<span class="comment">// 计算当前时间（0到1之间）</span></span><br><span class="line">		<span class="built_in">float</span> currentTime = Mathf.Repeat(Time.time / dayDuration, <span class="number">1f</span>);</span><br><span class="line"></span><br><span class="line">		<span class="comment">// 根据当前时间设置不同的状态</span></span><br><span class="line">		<span class="keyword">if</span> (currentTime &lt; <span class="number">0.5f</span>)</span><br><span class="line">		 &#123;</span><br><span class="line">    		<span class="comment">// 白天</span></span><br><span class="line"> ass="line">		<span class="function"><span class="keyword">void</span> <span class="title">SetEvening</span>()</span></span><br><span class="line">		&#123;</span><br><span class="line">			 <span class="comment">// 傍晚状态</span></span><br><span class="line">		sun.intensity = <span class="number">0.5f</span>;</span><br><span class="line">		lightEmit.intensity = <span class="number">0.5f</span>;</span><br><span class="line"></span><br><span class="line">            <span class="comment">// 部分室内灯光打开</span></span><br><span class="line">            <span class="keyword">foreach</span> (Light indoorLight <span class="keyword">in</span> indoorLights)</span><br><span class="line">            &#123;</span><br><span class="line">                indoorLight.intensity = <span class="number">0.5f</span>;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        <span class="function"><span class="keyword">void</span> <span class="title">SetNight</span>()</span></span><br><span class="line">        &#123;</span><br><span class="line">            <span class="comment">// 夜晚状态</span></span><br><span class="line">            sun.intensity = <span class="number">0f</span>;</span><br><span class="line">            lightEmit.intensity = <span class="number">0f</span>;</span><br><span class="line"></span><br><span class="line">            <span class="comment">// 所有室内灯光打开</span></span><br><span class="line">            <span class="keyword">foreach</span> (Light indoorLight <span class="keyword">in</span> indoorLights)</span><br><span class="line">            &#123;</span><br><span class="line">                indoorLight.intensity = <span class="number">1f</span>;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">	&#125;</span><br></pre></td></tr></table></figure>
